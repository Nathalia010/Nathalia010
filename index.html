<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portafolio | Karen Martinez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

<body>
    <div class="portfolio-app">
      <aside class="sidebar">
        <a id="portfolioLogo" href="#" class="logo"></a>
        <div id="profileContainer" class="profile"></div>
        <nav id="sidebarMenu" class="sidebar-menu"></nav>
        <div id="sidebarFooter" class="sidebar-footer"></div>
      </aside>

      <main class="dashboard">
        <header class="topbar">
          <div class="search-container">
            <div class="search-icon"><i class="bi bi-search"></i></div>
            <input type="search" id="dashboardSearch" placeholder="Buscar..." autocomplete="off" />
          </div>
          <div id="topbarActions" class="topbar-actions"></div>
        </header>

        <section id="inicio-view" class="dashboard-view active">
          <div id="homeHeading" class="page-heading"></div>
          <div class="row g-4">
            <div class="col-xl-5">
              <article class="dashboard-card home-studies-card">
                <div class="card-header-custom"><h2>Cursos y estudios</h2><button type="button" class="text-button internal-navigation" data-go="estudios-view">Ver todos</button></div>
                <div id="homeStudies" class="compact-list"></div>
              </article>
            </div>
            <div class="col-xl-7">
              <article class="dashboard-card about-card">
                <div class="card-header-custom"><h2>Sobre mí</h2></div>
                <div id="aboutContent" class="about-grid"></div>
              </article>
            </div>
          </div>

          <div class="row g-4 second-row">
            <div class="col-xl-5">
              <article class="dashboard-card home-skills-card">
                <div class="card-header-custom"><h2>Habilidades</h2><button type="button" class="text-button internal-navigation" data-go="habilidades-view">Ver todas</button></div>
                <div id="homeSkills" class="home-skills-list"></div>
              </article>
            </div>
            <div class="col-xl-7">
              <article class="dashboard-card home-projects-card">
                <div class="card-header-custom"><h2>Mis proyectos</h2><button type="button" class="text-button internal-navigation" data-go="proyectos-view">Ver todos</button></div>
                <div id="homeProjects" class="home-projects-grid" aria-live="polite"></div>
                <div class="projects-navigation">
                  <div class="projects-navigation-line"><span></span></div>
                  <button type="button" data-carousel-direction="previous" aria-label="Mostrar proyectos anteriores"><i class="bi bi-chevron-left"></i></button>
                  <button type="button" data-carousel-direction="next" aria-label="Mostrar proyectos siguientes"><i class="bi bi-chevron-right"></i></button>
                </div>
              </article>
            </div>
          </div>
        </section>

        <section id="estudios-view" class="dashboard-view">
          <div class="page-heading"><p>Formación académica</p><h1>Cursos y estudios</h1></div>
          <div id="studiesContainer" class="row g-4"></div>
        </section>

        <section id="experiencia-view" class="dashboard-view">
          <div class="page-heading"><p>Trayectoria profesional</p><h1>Experiencia laboral</h1></div>
          <div id="experienceContainer" class="experience-grid"></div>
        </section>

        <section id="habilidades-view" class="dashboard-view">
          <div class="page-heading"><p>Tecnologías y herramientas</p><h1>Mis habilidades</h1></div>
          <div id="skillsContainer" class="skills-full-grid"></div>
        </section>

        <section id="proyectos-view" class="dashboard-view">
          <div class="page-heading"><p>Trabajos realizados</p><h1>Mis proyectos</h1></div>
          <div id="projectsContainer" class="row g-4" aria-live="polite"></div>
        </section>

        <section id="contacto-view" class="dashboard-view">
          <div class="page-heading"><p>Información profesional</p><h1>Contacto</h1></div>
          <div id="contactsContainer" class="row g-4"></div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/infoPersonal.js"></script>
    <script src="scripts/script.js"></script>
  </body>
</html>
